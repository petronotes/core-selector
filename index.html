<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Core Selector — Анализ керна</title>
<style>
:root, [data-theme="light"] {
  --color-bg: #f7f6f2; --color-surface: #f9f8f5; --color-surface-2: #fbfbf9;
  --color-surface-offset: #f3f0ec; --color-surface-dynamic: #e6e4df;
  --color-divider: #dcd9d5; --color-border: #d4d1ca;
  --color-text: #28251d; --color-text-muted: #7a7974; --color-text-faint: #bab9b4;
  --color-primary: #01696f; --color-primary-hover: #0c4e54;
  --color-primary-highlight: #cedcd8;
  --color-success: #437a22; --color-error: #a12c7b;
  --color-warning: #964219; --color-warning-highlight: #ddcfc6;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.06); --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
  --radius-sm: 0.375rem; --radius-md: 0.5rem; --radius-lg: 0.75rem; --radius-full: 9999px;
  --space-1: 0.25rem; --space-2: 0.5rem; --space-3: 0.75rem; --space-4: 1rem;
  --space-5: 1.25rem; --space-6: 1.5rem; --space-8: 2rem;
  --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
  --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
  --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
  --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
  --transition: 180ms cubic-bezier(0.16, 1, 0.3, 1);
}
[data-theme="dark"], .dark {
  --color-bg: #171614; --color-surface: #1c1b19; --color-surface-2: #201f1d;
  --color-surface-offset: #1d1c1a; --color-surface-dynamic: #2d2c2a;
  --color-divider: #262523; --color-border: #393836;
  --color-text: #cdccca; --color-text-muted: #797876; --color-text-faint: #5a5957;
  --color-primary: #4f98a3; --color-primary-hover: #227f8b;
  --color-primary-highlight: #313b3b;
  --color-success: #6daa45; --color-error: #d163a7;
  --color-warning: #bb653b; --color-warning-highlight: #3a2e25;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.2); --shadow-md: 0 4px 12px rgba(0,0,0,0.3);
}
@media (prefers-color-scheme: dark) { :root:not([data-theme]) {
  --color-bg: #171614; --color-surface: #1c1b19; --color-surface-2: #201f1d;
  --color-surface-offset: #1d1c1a; --color-surface-dynamic: #2d2c2a;
  --color-divider: #262523; --color-border: #393836;
  --color-text: #cdccca; --color-text-muted: #797876; --color-text-faint: #5a5957;
  --color-primary: #4f98a3; --color-primary-hover: #227f8b;
  --color-primary-highlight: #313b3b;
  --color-success: #6daa45; --color-error: #d163a7; --color-warning: #bb653b;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.2); --shadow-md: 0 4px 12px rgba(0,0,0,0.3);
}}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-font-smoothing: antialiased; }
body {
  min-height: 100dvh; font-family: 'Inter', 'Segoe UI', sans-serif;
  font-size: var(--text-base); color: var(--color-text); background: var(--color-bg);
  display: flex; flex-direction: column; overflow: hidden; height: 100dvh;
}
input, button, select { font: inherit; color: inherit; }
button { cursor: pointer; background: none; border: none; }

.app-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: var(--space-3) var(--space-6); background: var(--color-surface);
  border-bottom: 1px solid var(--color-border); box-shadow: var(--shadow-sm);
  flex-shrink: 0; z-index: 100; gap: var(--space-3);
}
.app-logo { display: flex; align-items: center; gap: var(--space-2); font-weight: 600; font-size: var(--text-base); flex-shrink: 0; }
.app-logo svg { color: var(--color-primary); }
.header-actions { display: flex; align-items: center; gap: var(--space-2); flex-wrap: wrap; }

.app-body { display: flex; flex: 1; overflow: hidden; }
.canvas-area { flex: 1; overflow-y: auto; padding: var(--space-4); display: flex; flex-direction: column; align-items: center; gap: var(--space-3); }
.sidebar {
  width: 280px; min-width: 240px; max-width: 280px; background: var(--color-surface);
  border-left: 1px solid var(--color-border); display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden;
}

.controls-panel {
  background: var(--color-surface); border: 1px solid var(--color-border);
  border-radius: var(--radius-lg); padding: var(--space-4); width: 100%; max-width: 860px;
  display: flex; flex-wrap: wrap; gap: var(--space-3); align-items: flex-end;
}
.ctrl-group { display: flex; flex-direction: column; gap: var(--space-1); }
.ctrl-label { font-size: var(--text-xs); color: var(--color-text-muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; }
.ctrl-input {
  background: var(--color-surface-2); border: 1px solid var(--color-border);
  border-radius: var(--radius-md); padding: 6px 10px; font-size: var(--text-sm);
  color: var(--color-text); width: 110px; transition: border-color var(--transition);
}
.ctrl-input:focus { outline: 2px solid var(--color-primary); outline-offset: 1px; border-color: var(--color-primary); }
.ctrl-input.w80 { width: 80px; }
.ctrl-input.w140 { width: 140px; }

.btn {
  display: inline-flex; align-items: center; gap: var(--space-2);
  padding: 7px 14px; border-radius: var(--radius-md);
  font-size: var(--text-sm); font-weight: 500; transition: background var(--transition), color var(--transition), border-color var(--transition);
  white-space: nowrap; cursor: pointer;
}
.btn-primary { background: var(--color-primary); color: #fff; }
.btn-primary:hover { background: var(--color-primary-hover); }
.btn-secondary { background: var(--color-surface-offset); color: var(--color-text); border: 1px solid var(--color-border); }
.btn-secondary:hover { background: var(--color-surface-dynamic); }
.btn-danger { background: rgba(160,40,40,0.12); color: #d16363; border: 1px solid rgba(160,40,40,0.25); }
.btn-danger:hover { background: rgba(160,40,40,0.25); }
.btn-icon { width: 32px; height: 32px; display: inline-flex; align-items: center; justify-content: center; border-radius: var(--radius-md); color: var(--color-text-muted); transition: background var(--transition), color var(--transition); }
.btn-icon:hover { background: var(--color-surface-offset); color: var(--color-text); }

.canvas-wrapper {
  position: relative; display: inline-block;
  border: 2px solid var(--color-border); border-radius: var(--radius-md);
  overflow: hidden; box-shadow: var(--shadow-md); cursor: crosshair; max-width: 100%;
}
.canvas-wrapper canvas { display: block; max-width: 100%; height: auto; }
#overlayCanvas { position: absolute; top: 0; left: 0; pointer-events: none; }

.upload-zone {
  width: 100%; max-width: 860px; min-height: 220px;
  border: 2px dashed var(--color-border); border-radius: var(--radius-lg);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: var(--space-3); color: var(--color-text-muted); cursor: pointer;
  transition: border-color var(--transition), background var(--transition); padding: var(--space-8);
}
.upload-zone:hover, .upload-zone.dragover { border-color: var(--color-primary); background: var(--color-primary-highlight); }

.sidebar-header {
  padding: var(--space-3) var(--space-4); border-bottom: 1px solid var(--color-border);
  font-size: var(--text-sm); font-weight: 600; color: var(--color-text);
  display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
}
.sidebar-stats { padding: var(--space-3) var(--space-4); border-bottom: 1px solid var(--color-divider); flex-shrink: 0; }
.sidebar-stats-title { font-size: var(--text-xs); color: var(--color-text-faint); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: var(--space-2); }
.stat-row { display: flex; justify-content: space-between; align-items: center; padding: 3px 0; }
.stat-label { font-size: var(--text-xs); color: var(--color-text-muted); }
.stat-val { font-size: var(--text-xs); font-weight: 600; color: var(--color-text); }

.history-list { flex: 1; overflow-y: auto; padding: var(--space-2); display: flex; flex-direction: column; gap: var(--space-2); }
.history-list::-webkit-scrollbar { width: 5px; }
.history-list::-webkit-scrollbar-track { background: transparent; }
.history-list::-webkit-scrollbar-thumb { background: var(--color-border); border-radius: 3px; }

.history-item {
  background: var(--color-surface-2); border: 1px solid var(--color-border);
  border-radius: var(--radius-md); padding: var(--space-2) var(--space-3);
  cursor: pointer; transition: border-color var(--transition), background var(--transition);
  display: flex; align-items: center; gap: var(--space-2);
}
.history-item:hover { border-color: var(--color-primary); }
.history-item.active { border-color: var(--color-primary); background: var(--color-primary-highlight); }
.history-swatch { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }
.history-info { flex: 1; min-width: 0; }
.history-title { font-size: var(--text-xs); font-weight: 500; color: var(--color-text); }
.history-meta { font-size: var(--text-xs); color: var(--color-text-muted); margin-top: 2px; }
.history-del {
  width: 22px; height: 22px; display: flex; align-items: center; justify-content: center;
  border-radius: var(--radius-sm); color: var(--color-text-faint); flex-shrink: 0;
  transition: color var(--transition), background var(--transition); cursor: pointer;
  background: none; border: none;
}
.history-del:hover { color: #d16363; background: rgba(160,40,40,0.15); }

.badge {
  display: inline-flex; align-items: center; padding: 2px 8px;
  border-radius: var(--radius-full); font-size: var(--text-xs); font-weight: 600;
  background: var(--color-primary-highlight); color: var(--color-primary);
}
.empty-state { display: flex; flex-direction: column; align-items: center; text-align: center; padding: var(--space-8) var(--space-4); color: var(--color-text-muted); }
.empty-state svg { color: var(--color-text-faint); margin-bottom: var(--space-3); }
.empty-state p { font-size: var(--text-sm); max-width: 22ch; line-height: 1.5; }

.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: var(--color-warning); color: #fff; padding: 10px 20px;
  border-radius: var(--radius-md); font-size: var(--text-sm); z-index: 999;
  box-shadow: var(--shadow-md); opacity: 0; transition: opacity 0.3s;
}
.toast.show { opacity: 1; }
</style>

<body>

<header class="app-header">
  <div class="app-logo">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="3" y="3" width="18" height="18" rx="2"/>
      <path d="M3 9h18M3 15h18M9 3v18"/>

    Core Selector

    </button>
    <button class="btn btn-primary" id="btnExport" style="display:none">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
      Экспорт CSV
    </button>
    <button class="btn-icon" id="themeToggle" aria-label="Тема">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>

</header>

<div class="app-body">
  <div class="canvas-area" id="canvasArea">

    <!-- Upload -->
    <div class="upload-zone" id="uploadZone">
      <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>

    <!-- Controls -->

      <div class="ctrl-group">

        <input type="number" class="ctrl-input w80" id="inputRoof" placeholder="1200.00" step="0.01">
      </div>
      <div class="ctrl-group">
        <label class="ctrl-label">Подошва (м)</label>
        <input type="number" class="ctrl-input w80" id="inputBase" placeholder="1210.00" step="0.01">
      </div>
      <div class="ctrl-group">
        <label class="ctrl-label">Допуск (0–255)</label>
        <input type="number" class="ctrl-input w80" id="toleranceNum" value="32" min="0" max="255">

        <label class="ctrl-label">Режим клика</label>
        <select class="ctrl-input w140" id="modeSelect">
          <option value="new">＋ Новая область</option>
          <option value="add">＋ Добавить к активной</option>
          <option value="subtract">− Вычесть из активной</option>

        <label class="ctrl-label">Смежные</label>
        <select class="ctrl-input w80" id="contiguousSelect">
          <option value="true">Да</option>
          <option value="false">Нет</option>
        </select>
      </div>
      <div class="ctrl-group" style="margin-left:auto">
        <label class="ctrl-label">&nbsp;</label>
        <button class="btn btn-secondary" id="btnLoadNew">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
          Загрузить фото

    <!-- Canvas -->
    <div id="canvasOuter" style="display:none; width:100%; max-width:860px;">

  </div>

  <!-- Right sidebar -->

      История выделений

    </div>

    <div class="sidebar-stats" id="statsSection" style="display:none">
      <div class="sidebar-stats-title">Статистика</div>
      <div class="stat-row"><span class="stat-label">Выделено px</span><span class="stat-val" id="statSelected">—</span></div>
      <div class="stat-row"><span class="stat-label">Всего px</span><span class="stat-val" id="statTotal">—</span></div>
      <div class="stat-row"><span class="stat-label">Покрытие</span><span class="stat-val" id="statCoverage">—</span></div>
      <div class="stat-row"><span class="stat-label">Высота (px)</span><span class="stat-val" id="statHeight">—</span></div>
      <div class="stat-row"><span class="stat-label">px/см</span><span class="stat-val" id="statPxPerCm">—</span></div>
    </div>

    <div class="history-list" id="historyList">
      <div class="empty-state" id="emptyState">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <p>Нажмите на изображение для выделения области</p>
      </div>
    </div>
  </aside>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── State ────────────────────────────────────────────────────────────────────
let imgData = null;
let selections = [];
let activeSelId = null;
let selIdCounter = 0;

const COLORS = [
  '#4f98a3','#6daa45','#e8af34','#dd6974','#a86fdf','#fdab43',
  '#5591c7','#d163a7','#bb653b','#01696f','#437a22','#964219'
];

// ─── DOM ──────────────────────────────────────────────────────────────────────
const mainCanvas    = document.getElementById('mainCanvas');
const overlayCanvas = document.getElementById('overlayCanvas');
const ctx           = mainCanvas.getContext('2d', {willReadFrequently: true});
const octx          = overlayCanvas.getContext('2d');
const fileInput     = document.getElementById('fileInput');
const uploadZone    = document.getElementById('uploadZone');
const controlsPanel = document.getElementById('controlsPanel');
const canvasOuter   = document.getElementById('canvasOuter');
const historyList   = document.getElementById('historyList');
const selCount      = document.getElementById('selCount');
const statsSection  = document.getElementById('statsSection');
const btnExport     = document.getElementById('btnExport');
const btnClearAll   = document.getElementById('btnClearAll');
const filenameBadge = document.getElementById('filenameBadge');
const toleranceNum  = document.getElementById('toleranceNum');
const emptyState    = document.getElementById('emptyState');
const toastEl       = document.getElementById('toast');

// ─── Toast ────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), 3000);
}

// ─── Theme ────────────────────────────────────────────────────────────────────
(function(){
  const t = document.getElementById('themeToggle');
  const r = document.documentElement;
  let d = matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light';
  r.setAttribute('data-theme', d);
  function updateIcon() {
    t.innerHTML = d === 'dark'
      ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'
      : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
  }
  updateIcon();
  t.addEventListener('click', () => {
    d = d === 'dark' ? 'light' : 'dark';
    r.setAttribute('data-theme', d);
    updateIcon();
  });
})();

// ─── File loading ─────────────────────────────────────────────────────────────
function loadImageFile(file) {
  if (!file || !file.type.startsWith('image/')) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      selections = []; activeSelId = null; selIdCounter = 0;
      const maxW = document.querySelector('.canvas-area').clientWidth - 48;
      const scale = Math.min(1, maxW / img.width);
      mainCanvas.width  = Math.round(img.width  * scale);
      mainCanvas.height = Math.round(img.height * scale);
      overlayCanvas.width  = mainCanvas.width;
      overlayCanvas.height = mainCanvas.height;
      ctx.drawImage(img, 0, 0, mainCanvas.width, mainCanvas.height);
      imgData = ctx.getImageData(0, 0, mainCanvas.width, mainCanvas.height);
      uploadZone.style.display    = 'none';
      controlsPanel.style.display = 'flex';
      canvasOuter.style.display   = 'block';
      btnExport.style.display     = '';
      btnClearAll.style.display   = '';
      const nm = file.name;
      filenameBadge.textContent = nm.length > 22 ? nm.slice(0,20) + '…' : nm;
      filenameBadge.style.display = 'inline-flex';
      renderHistory(); updateStats();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

fileInput.addEventListener('change', e => { if(e.target.files[0]) loadImageFile(e.target.files[0]); });
document.getElementById('btnLoadNew').addEventListener('click', () => fileInput.click());
uploadZone.addEventListener('click', () => fileInput.click());
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault(); uploadZone.classList.remove('dragover');
  if(e.dataTransfer.files[0]) loadImageFile(e.dataTransfer.files[0]);
});
btnClearAll.addEventListener('click', () => {
  if (!confirm('Удалить все выделения?')) return;
  selections = []; activeSelId = null; selIdCounter = 0;
  if (overlayCanvas.width) octx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
  renderHistory(); updateStats();
});

// ─── Magic Wand ───────────────────────────────────────────────────────────────
function getPixel(d, x, y, w) {
  const i = (y * w + x) * 4;
  return [d[i], d[i+1], d[i+2]];
}
function colorDiff(a, b) {
  return Math.sqrt((a[0]-b[0])**2 + (a[1]-b[1])**2 + (a[2]-b[2])**2);
}
function magicWand(x, y, tolerance, contiguous) {
  const w = imgData.width, h = imgData.height, data = imgData.data;
  const seed = getPixel(data, x, y, w);
  const mask = new Uint8Array(w * h);
  if (contiguous) {
    const visited = new Uint8Array(w * h);
    const stack = [y * w + x];
    while (stack.length) {
      const idx = stack.pop();
      if (visited[idx]) continue;
      visited[idx] = 1;
      const cx = idx % w, cy = Math.floor(idx / w);
      const px = getPixel(data, cx, cy, w);
      if (colorDiff(px, seed) <= tolerance) {
        mask[idx] = 1;
        if (cx > 0)   stack.push(idx - 1);
        if (cx < w-1) stack.push(idx + 1);
        if (cy > 0)   stack.push(idx - w);
        if (cy < h-1) stack.push(idx + w);
      }
    }
  } else {
    for (let i = 0; i < w * h; i++) {
      const px = getPixel(data, i % w, Math.floor(i / w), w);
      if (colorDiff(px, seed) <= tolerance) mask[i] = 1;
    }
  }
  return mask;
}

// ─── Canvas click ─────────────────────────────────────────────────────────────
document.getElementById('cwInner').addEventListener('click', e => {
  if (!imgData) return;
  const rect = mainCanvas.getBoundingClientRect();
  const sx = mainCanvas.width  / rect.width;
  const sy = mainCanvas.height / rect.height;
  const x = Math.max(0, Math.min(imgData.width  - 1, Math.floor((e.clientX - rect.left) * sx)));
  const y = Math.max(0, Math.min(imgData.height - 1, Math.floor((e.clientY - rect.top)  * sy)));
  const tolerance   = Math.max(0, Math.min(255, parseInt(toleranceNum.value) || 32));
  const contiguous  = document.getElementById('contiguousSelect').value === 'true';
  const mode        = document.getElementById('modeSelect').value;
  const newMask = magicWand(x, y, tolerance, contiguous);
  const pxCount = newMask.reduce((s, v) => s + v, 0);
  if (pxCount === 0) { showToast('Пикселей не найдено — попробуйте увеличить допуск'); return; }

  if ((mode === 'add' || mode === 'subtract') && activeSelId !== null) {
    const sel = selections.find(s => s.id === activeSelId);
    if (sel) {
      if (mode === 'add') {
        for (let i = 0; i < sel.mask.length; i++) if (newMask[i]) sel.mask[i] = 1;
      } else {
        for (let i = 0; i < sel.mask.length; i++) if (newMask[i]) sel.mask[i] = 0;
      }
      sel.pixelCount = sel.mask.reduce((s,v) => s+v, 0);
    }
  } else {
    const color = COLORS[selIdCounter % COLORS.length];
    const id = ++selIdCounter;
    selections.push({ id, mask: newMask, color, label: 'Область ' + id, pixelCount: pxCount });
    activeSelId = id;
  }
  renderOverlay(); renderHistory(); updateStats();
});

// ─── Overlay ──────────────────────────────────────────────────────────────────
function hexToRgb(hex) {
  return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
}
function renderOverlay() {
  if (!imgData) return;
  const w = overlayCanvas.width, h = overlayCanvas.height;
  octx.clearRect(0, 0, w, h);
  const out = octx.createImageData(w, h);
  for (const sel of selections) {
    const isActive = sel.id === activeSelId;
    const [r,g,b] = hexToRgb(sel.color);
    const alpha = isActive ? 140 : 75;
    for (let i = 0; i < sel.mask.length; i++) {
      if (!sel.mask[i]) continue;
      const bi = i * 4;
      const ea = out.data[bi+3];
      if (ea === 0) {
        out.data[bi] = r; out.data[bi+1] = g; out.data[bi+2] = b; out.data[bi+3] = alpha;
      } else {
        const t = alpha / (ea + alpha);
        out.data[bi]   = Math.round(out.data[bi]   * (1-t) + r * t);
        out.data[bi+1] = Math.round(out.data[bi+1] * (1-t) + g * t);
        out.data[bi+2] = Math.round(out.data[bi+2] * (1-t) + b * t);
        out.data[bi+3] = Math.min(180, ea + alpha * 0.5);
      }
    }
  }
  octx.putImageData(out, 0, 0);
  // Border for active
  if (activeSelId !== null) {
    const sel = selections.find(s => s.id === activeSelId);
    if (sel) {
      octx.fillStyle = sel.color;
      const m = sel.mask, pw = w, ph = h;
      for (let y2 = 0; y2 < ph; y2++) for (let x2 = 0; x2 < pw; x2++) {
        const idx = y2 * pw + x2;
        if (!m[idx]) continue;
        if ((x2 === 0 || !m[idx-1]) || (x2 === pw-1 || !m[idx+1]) ||
            (y2 === 0 || !m[idx-pw]) || (y2 === ph-1 || !m[idx+pw]))
          octx.fillRect(x2, y2, 1, 1);
      }
    }
  }
}

// ─── History ──────────────────────────────────────────────────────────────────
function renderHistory() {
  selCount.textContent = selections.length;
  // Remove all non-empty-state children
  const items = historyList.querySelectorAll('.history-item');
  items.forEach(el => el.remove());
  if (selections.length === 0) {
    emptyState.style.display = '';
    return;
  }
  emptyState.style.display = 'none';
  const total = imgData ? imgData.width * imgData.height : 1;
  for (const sel of [...selections].reverse()) {
    const pct = ((sel.pixelCount / total) * 100).toFixed(1);
    const item = document.createElement('div');
    item.className = 'history-item' + (sel.id === activeSelId ? ' active' : '');
    item.dataset.selId = sel.id;
    item.innerHTML =
      '<div class="history-swatch" style="background:' + sel.color + '"></div>' +
      '<div class="history-info">' +
        '<div class="history-title">' + sel.label + '</div>' +
        '<div class="history-meta">' + sel.pixelCount.toLocaleString('ru') + ' px · ' + pct + '%</div>' +
      '</div>' +
      '<button class="history-del" data-del="' + sel.id + '" title="Удалить" aria-label="Удалить">' +
        '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg>' +
      '</button>';
    item.addEventListener('click', function(ev) {
      if (ev.target.closest('[data-del]')) return;
      activeSelId = sel.id;
      renderOverlay(); renderHistory(); updateStats();
    });
    item.querySelector('[data-del]').addEventListener('click', function(ev) {
      ev.stopPropagation();
      selections = selections.filter(s => s.id !== sel.id);
      if (activeSelId === sel.id) activeSelId = selections.length ? selections[selections.length-1].id : null;
      renderOverlay(); renderHistory(); updateStats();
    });
    historyList.insertBefore(item, emptyState);
  }
}

// ─── Stats ────────────────────────────────────────────────────────────────────
function getMergedMask() {
  if (!imgData) return null;
  const merged = new Uint8Array(imgData.width * imgData.height);
  for (const s of selections) for (let i = 0; i < merged.length; i++) if (s.mask[i]) merged[i] = 1;
  return merged;
}
function updateStats() {
  if (!imgData) { statsSection.style.display = 'none'; return; }
  statsSection.style.display = '';
  const merged = getMergedMask();
  const selected = merged ? merged.reduce((s,v) => s+v, 0) : 0;
  const total = imgData.width * imgData.height;
  document.getElementById('statSelected').textContent = selected.toLocaleString('ru');
  document.getElementById('statTotal').textContent    = total.toLocaleString('ru');
  document.getElementById('statCoverage').textContent = ((selected/total)*100).toFixed(1) + '%';
  document.getElementById('statHeight').textContent   = imgData.height + ' px';
  const roof = parseFloat(document.getElementById('inputRoof').value);
  const base = parseFloat(document.getElementById('inputBase').value);
  if (!isNaN(roof) && !isNaN(base) && base > roof) {
    const pxPerCm = imgData.height / ((base - roof) * 100);
    document.getElementById('statPxPerCm').textContent = pxPerCm.toFixed(2);
  } else {
    document.getElementById('statPxPerCm').textContent = '—';
  }
}
document.getElementById('inputRoof').addEventListener('input', updateStats);
document.getElementById('inputBase').addEventListener('input', updateStats);

// ─── Export CSV ───────────────────────────────────────────────────────────────
btnExport.addEventListener('click', function() {
  if (!imgData) { showToast('Загрузите фотографию!'); return; }
  if (selections.length === 0) { showToast('Нет выделенных областей!'); return; }
  const roof = parseFloat(document.getElementById('inputRoof').value);
  const base = parseFloat(document.getElementById('inputBase').value);
  if (isNaN(roof) || isNaN(base) || base <= roof) {
    showToast('Укажите корректные значения кровли и подошвы!'); return;
  }
  const w = imgData.width, h = imgData.height;
  const merged = getMergedMask();

  // Per-row fraction selected
  const rowFrac = new Float32Array(h);
  for (let y = 0; y < h; y++) {
    let cnt = 0;
    for (let x = 0; x < w; x++) if (merged[y * w + x]) cnt++;
    rowFrac[y] = cnt / w;
  }

  const totalCm = (base - roof) * 100;
  const pxPerCm = h / totalCm;
  const lines = ['depth_m,selected'];
  const nWindows = Math.floor(totalCm);
  for (let cm = 0; cm < nWindows; cm++) {
    const depth = (roof + cm / 100).toFixed(2);
    const y0 = Math.round(cm * pxPerCm);
    const y1 = Math.min(h, Math.round((cm + 1) * pxPerCm));
    let sum = 0, cnt = 0;
    for (let y = y0; y < y1; y++) { sum += rowFrac[y]; cnt++; }
    const val = cnt > 0 && (sum / cnt) >= 0.5 ? 1 : 0;
    lines.push(depth + ',' + val);
  }

  const blob = new Blob([lines.join('\n')], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'core_selection.csv'; a.click();
  URL.revokeObjectURL(url);
  showToast('CSV экспортирован: ' + nWindows + ' строк');
});
</script>
